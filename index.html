<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>SIGNALWATCH PRO</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#060b18;color:#e8eaf6;font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
#app{max-width:430px;margin:0 auto;padding:12px 12px 80px;overflow:hidden}
.mono{font-family:'JetBrains Mono',monospace}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding:4px 0}
.logo{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;letter-spacing:.15em;color:#00d4ff;text-shadow:0 0 30px #00d4ff55;white-space:nowrap}
.logo em{color:#e8eaf6;font-style:normal}
.logo small{font-size:9px;background:#b388ff;color:#fff;padding:2px 6px;border-radius:4px;margin-left:6px;letter-spacing:.08em;vertical-align:middle}
.dot{width:7px;height:7px;border-radius:50%;background:#00e676;box-shadow:0 0 10px #00e676;animation:pulse 2s infinite;display:inline-block}
.dot.off{background:#2a3d5a;box-shadow:none;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card{background:#0d1526;border:1px solid #1a2d50;border-radius:14px;padding:14px;margin-bottom:10px}
.card-title{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#8899bb;margin-bottom:10px}
input{background:#111d35;border:1px solid #1a2d50;border-radius:8px;padding:10px 13px;color:#e8eaf6;font-family:'JetBrains Mono',monospace;font-size:14px;outline:none;-webkit-appearance:none}
input:focus{border-color:#00d4ff}
input::placeholder{color:#2a3d5a}
.btn{background:#00d4ff;color:#060b18;border:none;border-radius:9px;padding:11px 16px;font-size:13px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;white-space:nowrap}
.btn:active{opacity:.8}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-g{background:transparent;color:#8899bb;border:1px solid #1a2d50;border-radius:9px;padding:8px 13px;font-size:11px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.btn-buy{background:#00e67622;color:#00e676;border:1px solid #00e67644;border-radius:9px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;flex:1;-webkit-tap-highlight-color:transparent}
.btn-sell{background:#ff3d5722;color:#ff3d57;border:1px solid #ff3d5744;border-radius:9px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;flex:1;-webkit-tap-highlight-color:transparent}
.tabs{display:flex;gap:3px;margin-bottom:12px;background:#0d1526;padding:3px;border-radius:11px;border:1px solid #1a2d50}
.tab{flex:1;padding:9px 0;background:none;border:none;color:#4a5d7a;font-size:10px;font-weight:600;cursor:pointer;border-radius:8px;-webkit-tap-highlight-color:transparent}
.tab.on{background:#162040;color:#00d4ff;box-shadow:0 2px 8px #00000055}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}
.mbox{background:#111d35;border:1px solid #1a2d50;border-radius:10px;padding:10px 11px}
.mbox-l{font-size:9px;color:#4a5d7a;text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
.mbox-v{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600}
.pos{color:#00e676}.neg{color:#ff3d57}.neu{color:#8899bb}.acc{color:#00d4ff}.ylw{color:#ffd740}.pur{color:#b388ff}
.sbar{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:9px;margin-bottom:5px;border:1px solid transparent}
.sbar-buy{background:#00e67612;border-color:#00e67633}
.sbar-sell{background:#ff3d5712;border-color:#ff3d5733}
.sbar-neu{background:#111d35;border-color:#1a2d50}
.sbar-warn{background:#ffd74012;border-color:#ffd74033}
.badge{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px}
.b-buy{background:#00e67622;color:#00e676}
.b-sell{background:#ff3d5722;color:#ff3d57}
.b-neu{background:#2a3d5a;color:#8899bb}
.b-warn{background:#ffd74022;color:#ffd740}
svg.chart{width:100%;height:90px;display:block;margin:8px 0}
.chip{font-family:'JetBrains Mono',monospace;font-size:11px;padding:5px 10px;background:#111d35;border:1px solid #1a2d50;border-radius:6px;color:#8899bb;cursor:pointer;display:inline-block;margin:2px;-webkit-tap-highlight-color:transparent}
.row{display:flex;justify-content:space-between;align-items:center;padding:9px 11px;background:#111d35;border:1px solid #1a2d50;border-radius:9px;margin-bottom:5px;gap:8px}
.bnav{position:fixed;bottom:0;left:0;right:0;background:#0d1526;border-top:1px solid #1a2d50;display:flex;padding:8px 0 20px;z-index:100}
.bnav-btn{flex:1;background:none;border:none;color:#4a5d7a;font-size:9px;font-weight:600;cursor:pointer;padding:4px 0;display:flex;flex-direction:column;align-items:center;gap:3px;-webkit-tap-highlight-color:transparent}
.bnav-btn.on{color:#00d4ff}
.bnav-icon{font-size:20px;line-height:1}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#00d4ff;color:#060b18;padding:9px 18px;border-radius:9px;font-weight:700;font-size:12px;z-index:999;white-space:nowrap;animation:slideUp .25s ease}
.spinner{width:13px;height:13px;border:2px solid #1a2d50;border-top-color:#00d4ff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle}
.err{font-size:11px;color:#ff3d57;padding:7px 11px;background:#ff3d5711;border:1px solid #ff3d5733;border-radius:8px;margin-top:7px}
.disc{font-size:9px;color:#2a3d5a;text-align:center;line-height:1.5;padding:10px 0 2px}
.sep{height:1px;background:#1a2d50;margin:10px 0}
.algo-tag{font-size:9px;background:#b388ff22;color:#b388ff;border:1px solid #b388ff44;padding:2px 7px;border-radius:4px;font-family:'JetBrains Mono',monospace}
.score-ring{display:inline-flex;align-items:center;justify-content:center;width:54px;height:54px;border-radius:50%;border:3px solid #1a2d50;font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700}
.key-wrap{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:24px}
</style>
</head>
<body>
<div id="app"></div>
<script>
const S={
  key:localStorage.getItem('sw_k')||'',
  keySet:!!localStorage.getItem('sw_k'),
  keyInput:'',showKey:false,
  tab:'live',
  sym:'',ticker:null,quote:null,prices:[],
  loading:false,error:'',
  alerts:JSON.parse(localStorage.getItem('sw_alerts')||'[]'),
  cash:parseFloat(localStorage.getItem('sw_cash')||'10000'),
  pos:JSON.parse(localStorage.getItem('sw_pos')||'{}'),
  hist:JSON.parse(localStorage.getItem('sw_hist')||'[]'),
  qty:'1',
  toast:'',toastT:null,pollT:null
};

function save(){
  localStorage.setItem('sw_alerts',JSON.stringify(S.alerts));
  localStorage.setItem('sw_cash',S.cash);
  localStorage.setItem('sw_pos',JSON.stringify(S.pos));
  localStorage.setItem('sw_hist',JSON.stringify(S.hist.slice(0,50)));
}

// ── Indicators ────────────────────────────────────────────────────────────────
function ema(arr,n){if(arr.length<n)return null;const k=2/(n+1);let e=arr[0];for(let i=1;i<arr.length;i++)e=arr[i]*k+e*(1-k);return e;}
function sma(arr,n){if(arr.length<n)return null;return arr.slice(-n).reduce((a,b)=>a+b,0)/n;}
function stddev(arr,n){if(arr.length<n)return null;const sl=arr.slice(-n),m=sl.reduce((a,b)=>a+b,0)/n;return Math.sqrt(sl.reduce((a,b)=>a+(b-m)**2,0)/n);}
function calcRSI(p,per=14){if(p.length<per+1)return null;const ch=p.slice(1).map((v,i)=>v-p[i]);const r=ch.slice(-per);const g=r.filter(x=>x>0).reduce((a,b)=>a+b,0)/per;const l=Math.abs(r.filter(x=>x<0).reduce((a,b)=>a+b,0))/per;if(l===0)return 100;return 100-100/(1+g/l);}
function calcMACD(p){if(p.length<26)return null;const e12=ema(p.slice(-12),12),e26=ema(p.slice(-26),26);if(!e12||!e26)return null;const m=e12-e26;return{macd:m,signal:m*(2/10),hist:m-m*(2/10)};}
function calcBB(p,n=20){const m=sma(p,n),s=stddev(p,n);if(!m||!s)return null;return{mid:m,upper:m+2*s,lower:m-2*s};}
function calcStoch(p,k=14){if(p.length<k)return null;const sl=p.slice(-k);const lo=Math.min(...sl),hi=Math.max(...sl);if(hi===lo)return{k:50};return{k:(p[p.length-1]-lo)/(hi-lo)*100};}
function calcWR(p,per=14){if(p.length<per)return null;const sl=p.slice(-per);const hi=Math.max(...sl),lo=Math.min(...sl);if(hi===lo)return-50;return(hi-p[p.length-1])/(hi-lo)*-100;}
function calcCCI(p,per=20){if(p.length<per)return null;const sl=p.slice(-per),m=sl.reduce((a,b)=>a+b,0)/per;const md=sl.reduce((a,b)=>a+Math.abs(b-m),0)/per;if(md===0)return 0;return(p[p.length-1]-m)/(0.015*md);}
function calcATR(p,per=14){if(p.length<per+1)return null;const trs=p.slice(1).map((v,i)=>Math.abs(v-p[i]));return trs.slice(-per).reduce((a,b)=>a+b,0)/per;}
function calcMOM(p,per=10){if(p.length<per+1)return null;return p[p.length-1]-p[p.length-1-per];}
function calcROC(p,per=12){if(p.length<per+1)return null;const old=p[p.length-1-per];return(p[p.length-1]-old)/old*100;}
function calcVWAP(p){if(p.length<2)return null;return p.reduce((a,b)=>a+b,0)/p.length;}
function calcIchi(p){if(p.length<52)return null;const h9=Math.max(...p.slice(-9)),l9=Math.min(...p.slice(-9));const h26=Math.max(...p.slice(-26)),l26=Math.min(...p.slice(-26));const h52=Math.max(...p.slice(-52)),l52=Math.min(...p.slice(-52));const tk=(h9+l9)/2,kj=(h26+l26)/2;return{tenkan:tk,kijun:kj,spanA:(tk+kj)/2,spanB:(h52+l52)/2};}
function calcSAR(p){if(p.length<5)return null;const last=p[p.length-1],prev=p[p.length-2];const trend=last>prev?'up':'down';const sar=trend==='up'?Math.min(...p.slice(-5))*.98:Math.max(...p.slice(-5))*1.02;return{sar,trend};}
function algoScore(p,q){
  if(!p||p.length<5)return null;
  let score=0,count=0;
  const add=v=>{score+=v;count++;};
  const r=calcRSI(p);if(r!==null)add(r<35?2:r<45?1:r>65?-2:r>55?-1:0);
  const m=calcMACD(p);if(m)add(m.hist>0?(m.hist>.5?2:1):(m.hist<-.5?-2:-1));
  const s20=sma(p,20),s50=sma(p,50);if(s20&&s50)add(s20>s50?2:-2);
  const bb=calcBB(p);if(bb&&q)add(q.c<bb.lower?2:q.c>bb.upper?-2:0);
  const st=calcStoch(p);if(st)add(st.k<20?2:st.k>80?-2:0);
  const cci=calcCCI(p);if(cci!==null)add(cci<-100?1:cci>100?-1:0);
  const mom=calcMOM(p);if(mom!==null)add(mom>0?1:-1);
  const ich=calcIchi(p);if(ich&&q)add(q.c>ich.spanA&&q.c>ich.spanB?2:q.c<ich.spanA&&q.c<ich.spanB?-2:0);
  if(count===0)return 0;
  return Math.round((score/(count*2))*100);
}

// ── API ───────────────────────────────────────────────────────────────────────
async function fetchQ(sym){
  if(!S.key)return;
  try{
    const r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${sym}&token=${S.key}`);
    const d=await r.json();
    if(!d||d.c===0){S.error='Symbol introuvable.';render();return;}
    S.quote=d;
    S.prices=[...S.prices,d.c].slice(-300);
    S.error='';
    checkAlerts(sym,d.c);
    render();
  }catch(e){S.error='Erreur réseau.';render();}
}

async function fetchCandles(sym){
  try{
    const to=Math.floor(Date.now()/1000),from=to-90*24*3600;
    const r=await fetch(`https://finnhub.io/api/v1/stock/candle?symbol=${sym}&resolution=D&from=${from}&to=${to}&token=${S.key}`);
    const d=await r.json();
    if(d&&d.s==='ok'&&d.c&&d.c.length>1){S.prices=d.c.slice(-200);return;}
  }catch(e){}
  try{
    const url=`https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=3mo`;
    const proxy=`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
    const r=await fetch(proxy);
    const raw=await r.json();
    const data=JSON.parse(raw.contents);
    const closes=data?.chart?.result?.[0]?.indicators?.quote?.[0]?.close;
    if(closes&&closes.length>1)S.prices=closes.filter(Boolean).slice(-200);
  }catch(e){}
}

async function doSearch(sym){
  const q=sym||S.sym.trim();
  if(!q||!S.key)return;
  S.loading=true;S.error='';S.quote=null;S.prices=[];render();
  try{
    const r=await fetch(`https://finnhub.io/api/v1/search?q=${q}&token=${S.key}`);
    const d=await r.json();
    if(!d.result||!d.result.length){S.error='Aucun résultat.';S.loading=false;render();return;}
    const t=d.result[0];
    S.ticker={symbol:t.symbol,desc:t.description};
    await fetchCandles(t.symbol);
    startPoll();
    await fetchQ(t.symbol);
  }catch(e){S.error='Erreur réseau.';}
  S.loading=false;render();
}

function startPoll(){
  if(S.pollT)clearInterval(S.pollT);
  if(!S.ticker||!S.key)return;
  S.pollT=setInterval(()=>fetchQ(S.ticker.symbol),8000);
}

function checkAlerts(sym,price){
  let fired=false;
  S.alerts=S.alerts.map(a=>{
    if(a.sym!==sym||a.fired)return a;
    const hit=(a.dir==='up'&&price>=a.thr)||(a.dir==='down'&&price<=a.thr);
    if(hit){fired=true;showToast(`🔔 ${sym} ${a.dir==='up'?'▲':'▼'} $${price.toFixed(2)}`);return{...a,fired:true,hitPrice:price,hitTime:new Date().toLocaleTimeString()};}
    return a;
  });
  if(fired)save();
}

function showToast(msg){
  S.toast=msg;
  if(S.toastT)clearTimeout(S.toastT);
  S.toastT=setTimeout(()=>{S.toast='';render();},3000);
}

function chartSVG(prices,color){
  if(!prices||prices.length<2)return'';
  const W=300,H=80;
  const mn=Math.min(...prices),mx=Math.max(...prices),rng=mx-mn||1;
  const pts=prices.map((p,i)=>{
    const x=(i/(prices.length-1))*W;
    const y=H-((p-mn)/rng)*H*.88-H*.06;
    return`${x},${y}`;
  });
  const path='M'+pts.join(' L');
  const area=`${path} L${W},${H} L0,${H} Z`;
  return`<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${area}" fill="url(#cg)"/>
    <path d="${path}" stroke="${color}" stroke-width="2" fill="none" stroke-linecap="round"/>
  </svg>`;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  document.getElementById('app').innerHTML=S.keySet?buildApp():buildKeyScreen();
  bind();
}

function buildKeyScreen(){
  return`<div class="key-wrap">
    <div style="text-align:center;margin-bottom:28px">
      <div class="logo" style="font-size:22px;justify-content:center;display:flex;align-items:center;gap:6px">SIGNAL<em>WATCH</em><small>PRO</small></div>
      <div style="font-size:11px;color:#8899bb;margin-top:8px">Trading Terminal · Données temps réel</div>
    </div>
    <div class="card">
      <div class="card-title">Clé API Finnhub</div>
      <div style="display:flex;gap:6px;margin-bottom:10px;align-items:center">
        <div style="flex:1;position:relative">
          <input id="ki" type="${S.showKey?'text':'password'}" placeholder="Colle ta clé ici..."
            value="${(S.keyInput||'').replace(/"/g,'')}" style="width:100%;padding-right:70px"/>
          <div style="position:absolute;right:8px;top:50%;transform:translateY(-50%);display:flex;gap:6px">
            <button id="toggleKey" style="background:none;border:none;cursor:pointer;font-size:16px;color:${S.showKey?'#00d4ff':'#4a5d7a'};padding:0;line-height:1">${S.showKey?'🙈':'👁'}</button>
            <button id="clearKey" style="background:none;border:none;cursor:pointer;font-size:14px;color:#4a5d7a;padding:0;line-height:1">✕</button>
          </div>
        </div>
        <button class="btn" id="okKey">OK</button>
      </div>
      ${S.keyInput?`<div style="font-size:10px;color:#4a5d7a;font-family:'JetBrains Mono',monospace;margin-bottom:8px">${S.keyInput.length} caractères — clé correcte = 20 car.</div>`:''}
      <div style="font-size:10px;color:#4a5d7a;line-height:1.8">
        🔒 Stockée localement — jamais partagée<br>
        📊 finnhub.io → Dashboard → API Key
      </div>
    </div>
    <div class="disc">Ne partage jamais ta clé. Régénère-la sur finnhub.io si nécessaire.</div>
  </div>`;
}

function buildApp(){
  const q=S.quote;
  const pct=q?(q.c-q.pc)/q.pc*100:0;
  const col=pct>=0?'#00e676':'#ff3d57';
  const p=S.prices;
  const I={
    sma20:sma(p,20),sma50:sma(p,50),sma200:sma(p,200),
    ema9:ema(p.slice(-9),9),ema21:ema(p.slice(-21),21),
    rsi:calcRSI(p),macd:calcMACD(p),bb:calcBB(p),
    stoch:calcStoch(p),will:calcWR(p),cci:calcCCI(p),
    atr:calcATR(p),mom:calcMOM(p),roc:calcROC(p),
    vwap:calcVWAP(p),ich:calcIchi(p),sar:calcSAR(p),
    score:algoScore(p,q)
  };

  let content='';

  if(S.tab==='live'){
    if(S.ticker&&q){
      const sc=I.score??0;
      const scCol=sc>30?'#00e676':sc<-30?'#ff3d57':'#ffd740';
      const scLbl=sc>60?'FORT ACHAT':sc>20?'ACHAT':sc<-60?'FORTE VENTE':sc<-20?'VENTE':'NEUTRE';
      content=`
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
          <div>
            <div class="mono" style="font-size:22px;font-weight:700">${S.ticker.symbol}</div>
            <div style="font-size:10px;color:#8899bb;margin-top:2px;max-width:190px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${S.ticker.desc||''}</div>
          </div>
          <div style="text-align:right">
            <div class="mono ${pct>=0?'pos':'neg'}" style="font-size:30px;font-weight:700;line-height:1">$${q.c.toFixed(2)}</div>
            <div class="mono ${pct>=0?'pos':'neg'}" style="font-size:13px;margin-top:3px">${pct>=0?'▲':'▼'} ${Math.abs(pct).toFixed(2)}%</div>
          </div>
        </div>
        ${chartSVG(p,col)}
        ${p.length>1?`<div style="font-size:9px;color:#4a5d7a;text-align:center">${p.length} pts · live 8s</div>`:''}
        <div style="height:1px;background:#1a2d50;margin:10px 0"></div>
        <div class="g4">
          <div class="mbox"><div class="mbox-l">Open</div><div class="mbox-v neu">$${q.o?.toFixed(2)||'-'}</div></div>
          <div class="mbox"><div class="mbox-l">Prev</div><div class="mbox-v neu">$${q.pc?.toFixed(2)||'-'}</div></div>
          <div class="mbox"><div class="mbox-l">High</div><div class="mbox-v pos">$${q.h?.toFixed(2)||'-'}</div></div>
          <div class="mbox"><div class="mbox-l">Low</div><div class="mbox-v neg">$${q.l?.toFixed(2)||'-'}</div></div>
        </div>
      </div>
      <div class="card" style="display:flex;align-items:center;gap:14px">
        <div class="score-ring" style="border-color:${scCol};color:${scCol};flex-shrink:0">${sc}</div>
        <div>
          <div style="font-size:10px;color:#8899bb;margin-bottom:4px">ALGO SCORE <span class="algo-tag">LUX</span></div>
          <div style="font-size:18px;font-weight:700;color:${scCol}">${scLbl}</div>
          <div style="font-size:9px;color:#4a5d7a;margin-top:2px">${p.length} points analysés</div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Indicateurs clés</div>
        <div class="g2">
          <div class="mbox"><div class="mbox-l">RSI 14</div><div class="mbox-v ${I.rsi?I.rsi<35?'pos':I.rsi>65?'neg':'neu':'neu'}">${I.rsi?I.rsi.toFixed(1):'—'}</div></div>
          <div class="mbox"><div class="mbox-l">MACD Hist</div><div class="mbox-v ${I.macd?I.macd.hist>0?'pos':'neg':'neu'}">${I.macd?I.macd.hist.toFixed(3):'—'}</div></div>
          <div class="mbox"><div class="mbox-l">Stoch %K</div><div class="mbox-v ${I.stoch?I.stoch.k<20?'pos':I.stoch.k>80?'neg':'neu':'neu'}">${I.stoch?I.stoch.k.toFixed(1):'—'}</div></div>
          <div class="mbox"><div class="mbox-l">ATR 14</div><div class="mbox-v ylw">${I.atr?'$'+I.atr.toFixed(2):'—'}</div></div>
          <div class="mbox"><div class="mbox-l">CCI 20</div><div class="mbox-v ${I.cci?I.cci<-100?'pos':I.cci>100?'neg':'neu':'neu'}">${I.cci?I.cci.toFixed(0):'—'}</div></div>
          <div class="mbox"><div class="mbox-l">Williams %R</div><div class="mbox-v ${I.will?I.will<-80?'pos':I.will>-20?'neg':'neu':'neu'}">${I.will?I.will.toFixed(1):'—'}</div></div>
          <div class="mbox"><div class="mbox-l">ROC 12</div><div class="mbox-v ${I.roc?I.roc>0?'pos':'neg':'neu'}">${I.roc?I.roc.toFixed(2)+'%':'—'}</div></div>
          <div class="mbox"><div class="mbox-l">Momentum</div><div class="mbox-v ${I.mom?I.mom>0?'pos':'neg':'neu'}">${I.mom?I.mom.toFixed(2):'—'}</div></div>
        </div>
        ${p.length<20?`<div style="margin-top:8px;font-size:10px;color:#ffd740;text-align:center">⚠️ ${p.length}/20 points — indicateurs en construction</div>`:''}
      </div>
      <div class="card">
        <div class="card-title">Trade simulé — ${S.ticker.symbol}</div>
        <div style="display:flex;gap:6px">
          <input type="number" id="qty" value="${S.qty}" min="1" style="width:70px;text-align:center"/>
          <button class="btn-buy" id="doBuy">▲ BUY</button>
          <button class="btn-sell" id="doSell">▼ SELL</button>
        </div>
        ${S.pos[S.ticker.symbol]?`<div style="margin-top:7px;font-size:10px;color:#8899bb" class="mono">Pos: ${S.pos[S.ticker.symbol].qty}× · moy $${S.pos[S.ticker.symbol].avg.toFixed(2)}</div>`:''}
      </div>`;
    }else if(!S.loading){
      content=`<div style="text-align:center;color:#4a5d7a;font-size:13px;padding:40px 0">Cherche un ticker pour commencer</div>`;
    }
  }

  if(S.tab==='signals'){
    const sigs=[
      {n:'SMA 20/50',v:I.sma20&&I.sma50?`${I.sma20.toFixed(2)} / ${I.sma50.toFixed(2)}`:null,s:I.sma20&&I.sma50?(I.sma20>I.sma50?'BUY':'SELL'):'—',cat:'Tendance'},
      {n:'SMA 200',v:I.sma200?`$${I.sma200.toFixed(2)}`:null,s:q&&I.sma200?(q.c>I.sma200?'BUY':'SELL'):'—',cat:'Tendance'},
      {n:'EMA 9/21',v:I.ema9&&I.ema21?`${I.ema9.toFixed(2)} / ${I.ema21.toFixed(2)}`:null,s:I.ema9&&I.ema21?(I.ema9>I.ema21?'BUY':'SELL'):'—',cat:'Tendance'},
      {n:'Ichimoku',v:I.ich?`T:${I.ich.tenkan.toFixed(1)}`:null,s:I.ich&&q?(q.c>I.ich.spanA&&q.c>I.ich.spanB?'BUY':q.c<I.ich.spanA&&q.c<I.ich.spanB?'SELL':'NEUTRAL'):'—',cat:'Tendance'},
      {n:'Parabolic SAR',v:I.sar?`$${I.sar.sar.toFixed(2)}`:null,s:I.sar?(I.sar.trend==='up'?'BUY':'SELL'):'—',cat:'Tendance'},
      {n:'RSI 14',v:I.rsi,s:I.rsi?(I.rsi<35?'BUY':I.rsi>65?'SELL':'NEUTRAL'):'—',cat:'Momentum'},
      {n:'MACD',v:I.macd?I.macd.hist:null,s:I.macd?(I.macd.hist>0?'BUY':'SELL'):'—',cat:'Momentum'},
      {n:'Stoch %K',v:I.stoch?I.stoch.k:null,s:I.stoch?(I.stoch.k<20?'BUY':I.stoch.k>80?'SELL':'NEUTRAL'):'—',cat:'Momentum'},
      {n:'CCI 20',v:I.cci,s:I.cci?(I.cci<-100?'BUY':I.cci>100?'SELL':'NEUTRAL'):'—',cat:'Momentum'},
      {n:'Williams %R',v:I.will,s:I.will?(I.will<-80?'BUY':I.will>-20?'SELL':'NEUTRAL'):'—',cat:'Momentum'},
      {n:'ROC 12',v:I.roc,s:I.roc?(I.roc>2?'BUY':I.roc<-2?'SELL':'NEUTRAL'):'—',cat:'Momentum'},
      {n:'Momentum 10',v:I.mom,s:I.mom?(I.mom>0?'BUY':'SELL'):'—',cat:'Momentum'},
      {n:'Bollinger',v:I.bb&&q?`${I.bb.lower.toFixed(2)}–${I.bb.upper.toFixed(2)}`:null,s:I.bb&&q?(q.c<I.bb.lower?'BUY':q.c>I.bb.upper?'SELL':'NEUTRAL'):'—',cat:'Volatilité'},
      {n:'ATR 14',v:I.atr,s:I.atr?(I.atr>2?'WARN':'NEUTRAL'):'—',cat:'Volatilité'},
      {n:'VWAP',v:I.vwap&&q?`$${I.vwap.toFixed(2)}`:null,s:I.vwap&&q?(q.c>I.vwap?'BUY':'SELL'):'—',cat:'Volume'},
    ];
    const buys=sigs.filter(s=>s.s==='BUY').length;
    const sells=sigs.filter(s=>s.s==='SELL').length;
    const total=sigs.filter(s=>s.s!=='—').length;
    const sc=I.score??0;
    const scCol=sc>30?'#00e676':sc<-30?'#ff3d57':'#ffd740';
    content=`<div class="card" style="display:flex;align-items:center;gap:12px">
      <div class="score-ring" style="border-color:${scCol};color:${scCol};flex-shrink:0">${sc}</div>
      <div style="flex:1">
        <div style="display:flex;gap:6px;margin-bottom:5px;flex-wrap:wrap">
          <span class="badge b-buy">▲ ${buys} BUY</span>
          <span class="badge b-sell">▼ ${sells} SELL</span>
          <span class="badge b-neu">${total-buys-sells} NEU</span>
        </div>
        <div style="font-size:10px;color:#8899bb">${total} indicateurs <span class="algo-tag">ALGO</span></div>
      </div>
    </div>`;
    let lastCat='';
    sigs.forEach(sg=>{
      if(sg.cat!==lastCat){content+=`<div style="font-size:9px;color:#4a5d7a;text-transform:uppercase;letter-spacing:.1em;margin:8px 0 4px;padding:0 2px">${sg.cat}</div>`;lastCat=sg.cat;}
      const bc=sg.s==='BUY'?'sbar-buy':sg.s==='SELL'?'sbar-sell':sg.s==='WARN'?'sbar-warn':'sbar-neu';
      const bd=sg.s==='BUY'?'b-buy':sg.s==='SELL'?'b-sell':sg.s==='WARN'?'b-warn':'b-neu';
      content+=`<div class="sbar ${bc}"><div><div style="font-size:12px;font-weight:500">${sg.n}</div>${sg.v!==null?`<div style="font-size:9px;color:#4a5d7a;margin-top:1px;font-family:'JetBrains Mono',monospace">${typeof sg.v==='number'?sg.v.toFixed(2):sg.v}</div>`:''}</div><span class="badge ${bd}">${sg.s}</span></div>`;
    });
    if(!S.ticker||!q)content=`<div style="text-align:center;color:#4a5d7a;font-size:13px;padding:40px 0">Cherche un ticker pour commencer</div>`;
    content+=`<div class="disc">Indicateurs techniques — ne constituent pas un conseil financier.</div>`;
  }

  if(S.tab==='alerts'){
    const active=S.alerts.filter(a=>!a.fired);
    const fired=S.alerts.filter(a=>a.fired);
    content=`<div class="card">
      <div class="card-title">Nouvelle alerte</div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <input type="number" id="apct" value="1" min="0.1" step="0.1" style="width:75px" placeholder="%"/>
        <button class="btn" id="addAlUp" ${!S.ticker||!q?'disabled':''} style="padding:10px 12px">▲ +%</button>
        <button class="btn" id="addAlDn" ${!S.ticker||!q?'disabled':''} style="padding:10px 12px">▼ −%</button>
        <button class="btn" id="addAlBoth" ${!S.ticker||!q?'disabled':''} style="background:#b388ff;padding:10px 12px">±%</button>
      </div>
      ${!S.ticker?'<div style="font-size:10px;color:#4a5d7a;margin-top:8px">Cherche d\'abord un ticker.</div>':''}
      ${q?`<div style="font-size:10px;color:#8899bb;margin-top:8px" class="mono">Réf: $${q.c.toFixed(2)} — ${S.ticker?.symbol}</div>`:''}
    </div>`;
    if(active.length){
      content+=`<div class="card"><div class="card-title">Actives (${active.length})</div>`;
      active.forEach(a=>{content+=`<div class="row"><span class="mono" style="font-weight:600;font-size:13px">${a.sym}</span><span class="mono ${a.dir==='up'?'pos':'neg'}" style="font-size:12px">${a.dir==='up'?'▲':'▼'} $${a.thr.toFixed(2)}</span><span style="font-size:10px;color:#4a5d7a">±${a.pct}%</span><button class="btn-g" data-del="${a.id}" style="font-size:10px;padding:4px 8px">✕</button></div>`;});
      content+=`</div>`;
    }
    if(fired.length){
      content+=`<div class="card"><div class="card-title">Déclenchées</div>`;
      fired.slice(0,8).forEach(a=>{content+=`<div class="row"><span class="mono" style="font-weight:600">${a.sym}</span><span class="mono ${a.dir==='up'?'pos':'neg'}">${a.dir==='up'?'▲':'▼'} $${a.hitPrice?.toFixed(2)}</span><span style="font-size:10px;color:#4a5d7a">${a.hitTime||''}</span></div>`;});
      content+=`<button class="btn-g" id="clearAlerts" style="width:100%;margin-top:6px">Effacer tout</button></div>`;
    }
    if(!active.length&&!fired.length)content+=`<div style="text-align:center;color:#4a5d7a;font-size:12px;padding:24px 0">Aucune alerte configurée</div>`;
  }

  if(S.tab==='portfolio'){
    let total=S.cash;
    Object.entries(S.pos).forEach(([sym,pos])=>{total+=pos.qty*(sym===S.ticker?.symbol&&q?q.c:pos.avg);});
    const pnl=total-10000;
    content=`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div><div class="card-title" style="margin-bottom:2px">Portfolio simulé</div><div style="font-size:9px;color:#4a5d7a">Capital initial: €10,000</div></div>
        <div style="text-align:right">
          <div class="mono ylw" style="font-size:22px;font-weight:700">€${total.toFixed(2)}</div>
          <div class="mono ${pnl>=0?'pos':'neg'}" style="font-size:11px">${pnl>=0?'+':''}€${pnl.toFixed(2)} (${((pnl/10000)*100).toFixed(2)}%)</div>
        </div>
      </div>
      <div class="g2">
        <div class="mbox"><div class="mbox-l">Cash</div><div class="mbox-v neu">€${S.cash.toFixed(2)}</div></div>
        <div class="mbox"><div class="mbox-l">Positions</div><div class="mbox-v acc">${Object.keys(S.pos).length}</div></div>
      </div>
    </div>`;
    if(Object.keys(S.pos).length){
      content+=`<div class="card"><div class="card-title">Positions ouvertes</div>`;
      Object.entries(S.pos).forEach(([sym,pos])=>{
        const price=sym===S.ticker?.symbol&&q?q.c:pos.avg;
        const ppnl=(price-pos.avg)*pos.qty;
        content+=`<div class="row"><div><div class="mono" style="font-weight:600;font-size:13px">${sym}</div><div style="font-size:9px;color:#4a5d7a">${pos.qty}× · moy $${pos.avg.toFixed(2)}</div></div><div style="text-align:right"><div class="mono" style="font-size:12px">$${(pos.qty*price).toFixed(2)}</div><div class="mono ${ppnl>=0?'pos':'neg'}" style="font-size:10px">${ppnl>=0?'+':''}$${ppnl.toFixed(2)}</div></div></div>`;
      });
      content+=`</div>`;
    }
    if(S.hist.length){
      content+=`<div class="card"><div class="card-title">Historique</div>`;
      S.hist.slice(0,10).forEach(t=>{content+=`<div class="row" style="padding:7px 10px"><span style="color:${t.type==='BUY'?'#00e676':'#ff3d57'};font-size:10px;font-weight:700">${t.type}</span><span class="mono" style="font-size:11px">${t.qty}× ${t.sym}</span><span style="font-size:10px;color:#8899bb">$${t.price.toFixed(2)}</span><span style="font-size:9px;color:#4a5d7a">${t.time}</span></div>`;});
      content+=`<button class="btn-g" id="resetPortfolio" style="width:100%;margin-top:6px;color:#ff3d57;border-color:#ff3d5744">Reset portfolio</button></div>`;
    }
    if(!Object.keys(S.pos).length&&!S.hist.length)content+=`<div style="text-align:center;color:#4a5d7a;font-size:12px;padding:24px 0">Aucune position. Cherche un ticker et trade.</div>`;
    content+=`<div class="disc">Simulation uniquement — aucune transaction réelle.</div>`;
  }

  return`
  <div class="hdr">
    <div class="logo" style="display:flex;align-items:center">SIGNAL<em>WATCH</em><small>PRO</small></div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="dot ${S.ticker?'':'off'}"></div>
      <span style="font-size:10px;color:#8899bb" class="mono">${S.ticker?S.ticker.symbol:'—'}</span>
      <button class="btn-g" id="resetKey" style="padding:6px 12px;font-size:11px">🔑</button>
    </div>
  </div>
  <div class="card">
    <div style="display:flex;gap:7px">
      <input type="text" id="si" placeholder="AAPL, TSLA, BTC-USD..." value="${S.sym}" style="flex:1;font-size:15px"/>
      <button class="btn" id="doSearch" ${S.loading?'disabled':''}>${S.loading?'<span class="spinner"></span>':'Go'}</button>
    </div>
    <div style="margin-top:8px">
      ${['AAPL','MSFT','TSLA','NVDA','AMZN','BTC-USD','ETH-USD'].map(s=>`<span class="chip" data-t="${s}">${s}</span>`).join('')}
    </div>
    ${S.error?`<div class="err">${S.error}</div>`:''}
  </div>
  ${content}
  ${S.toast?`<div class="toast">${S.toast}</div>`:''}
  <nav class="bnav">
    <button class="bnav-btn ${S.tab==='live'?'on':''}" data-tab="live"><span class="bnav-icon">📈</span>Live</button>
    <button class="bnav-btn ${S.tab==='signals'?'on':''}" data-tab="signals"><span class="bnav-icon">⚡</span>Signaux</button>
    <button class="bnav-btn ${S.tab==='alerts'?'on':''}" data-tab="alerts"><span class="bnav-icon">🔔</span>Alertes</button>
    <button class="bnav-btn ${S.tab==='portfolio'?'on':''}" data-tab="portfolio"><span class="bnav-icon">💼</span>Portfolio</button>
  </nav>`;
}

// ── BIND ──────────────────────────────────────────────────────────────────────
function bind(){
  const ki=document.getElementById('ki');
  if(ki){
    ki.addEventListener('input',e=>{
      let v=e.target.value;
      if(v.length>20){v=v.substring(0,20);e.target.value=v;}
      S.keyInput=v;
    });
    ki.addEventListener('keydown',e=>e.key==='Enter'&&confirmKey());
    setTimeout(()=>ki.focus(),100);
  }
  document.getElementById('toggleKey')?.addEventListener('click',()=>{S.showKey=!S.showKey;render();});
  document.getElementById('clearKey')?.addEventListener('click',()=>{S.keyInput='';render();});
  document.getElementById('okKey')?.addEventListener('click',confirmKey);
  document.getElementById('resetKey')?.addEventListener('click',()=>{localStorage.removeItem('sw_k');S.key='';S.keyInput='';S.keySet=false;render();});
  document.querySelectorAll('[data-tab]').forEach(b=>b.addEventListener('click',e=>{S.tab=e.currentTarget.dataset.tab;render();}));
  const si=document.getElementById('si');
  if(si){si.addEventListener('input',e=>S.sym=e.target.value.toUpperCase());si.addEventListener('keydown',e=>e.key==='Enter'&&doSearch());}
  document.getElementById('doSearch')?.addEventListener('click',()=>doSearch());
  document.querySelectorAll('[data-t]').forEach(c=>c.addEventListener('click',e=>{S.sym=e.currentTarget.dataset.t;doSearch(e.currentTarget.dataset.t);}));
  document.getElementById('qty')?.addEventListener('input',e=>S.qty=e.target.value);
  document.getElementById('doBuy')?.addEventListener('click',doBuy);
  document.getElementById('doSell')?.addEventListener('click',doSell);
  document.getElementById('addAlUp')?.addEventListener('click',()=>addAlert('up'));
  document.getElementById('addAlDn')?.addEventListener('click',()=>addAlert('down'));
  document.getElementById('addAlBoth')?.addEventListener('click',()=>{addAlert('up');addAlert('down');});
  document.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',e=>{S.alerts=S.alerts.filter(a=>a.id!=e.currentTarget.dataset.del);save();render();}));
  document.getElementById('clearAlerts')?.addEventListener('click',()=>{S.alerts=[];save();render();});
  document.getElementById('resetPortfolio')?.addEventListener('click',()=>{if(confirm('Reset?')){S.cash=10000;S.pos={};S.hist=[];save();render();}});
}

function confirmKey(){
  const k=(S.keyInput||'').trim().substring(0,20);
  if(!k)return;
  localStorage.setItem('sw_k',k);
  S.key=k;S.keySet=true;render();
}

function doBuy(){
  if(!S.ticker||!S.quote)return;
  const qty=parseInt(S.qty)||0;if(qty<=0)return;
  const cost=qty*S.quote.c;
  if(cost>S.cash){showToast('Fonds insuffisants');return;}
  S.cash-=cost;
  const ex=S.pos[S.ticker.symbol];
  if(ex){const nq=ex.qty+qty;S.pos[S.ticker.symbol]={qty:nq,avg:(ex.qty*ex.avg+cost)/nq};}
  else S.pos[S.ticker.symbol]={qty,avg:S.quote.c};
  S.hist=[{type:'BUY',sym:S.ticker.symbol,qty,price:S.quote.c,time:new Date().toLocaleTimeString()},...S.hist.slice(0,49)];
  save();showToast(`✅ BUY ${qty}× ${S.ticker.symbol}`);render();
}

function doSell(){
  if(!S.ticker||!S.quote)return;
  const qty=parseInt(S.qty)||0;
  const pos=S.pos[S.ticker.symbol];
  if(!pos||pos.qty<qty||qty<=0){showToast('Quantité invalide');return;}
  S.cash+=qty*S.quote.c;
  const nq=pos.qty-qty;
  if(nq===0)delete S.pos[S.ticker.symbol];
  else S.pos[S.ticker.symbol]={...pos,qty:nq};
  S.hist=[{type:'SELL',sym:S.ticker.symbol,qty,price:S.quote.c,time:new Date().toLocaleTimeString()},...S.hist.slice(0,49)];
  save();showToast(`✅ SELL ${qty}× ${S.ticker.symbol}`);render();
}

function addAlert(dir){
  if(!S.ticker||!S.quote)return;
  const pct=parseFloat(document.getElementById('apct')?.value||'1');
  const thr=S.quote.c*(dir==='up'?1+pct/100:1-pct/100);
  S.alerts=[...S.alerts,{sym:S.ticker.symbol,price:S.quote.c,thr,dir,pct,fired:false,id:Date.now()+Math.random()}];
  save();showToast(`🔔 ${dir==='up'?'▲':'▼'} $${thr.toFixed(2)}`);render();
}

render();
</script>
</body>
</html>
